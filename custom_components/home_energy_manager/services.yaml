force_reconnect:
  name: Force Reconnect
  description: >-
    Force the Home Energy Manager integration to reconnect to the API when it appears
    to be stuck. Resets the client, re-authenticates, and refreshes data.
  fields:
    entry_id:
      name: Integration ID
      description: >-
        Specific Home Energy Manager integration to act on. Required only if multiple
        accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

health_check:
  name: Health Check
  description: >-
    Run a comprehensive health check on the Home Energy Manager integration. Results
    are shown in a persistent notification.
  fields:
    entry_id:
      name: Integration ID
      description: >-
        Specific Home Energy Manager integration to act on. Required only if multiple
        accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

toggle_diagnostics:
  name: Toggle Diagnostics
  description: Enable or disable detailed diagnostic logging.
  fields:
    enable:
      name: Enable
      description: True to enable, false to disable.
      required: false
      example: true
      selector:
        boolean:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_discharge_time:
  name: Set Discharge End Time
  description: Set the end time for battery discharge.
  fields:
    end_discharge:
      name: End Discharge Time
      description: HH:MM
      example: "23:00"
      required: true
      selector:
        time: {}
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_discharge_start_time:
  name: Set Discharge Start Time
  description: Set the start time for battery discharge.
  fields:
    start_discharge:
      name: Start Discharge Time
      description: HH:MM
      example: "16:00"
      required: true
      selector:
        time: {}
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_charge_start_time:
  name: Set Charge Start Time
  description: Set the start time for battery charging.
  fields:
    start_charge:
      name: Start Charge Time
      description: HH:MM
      example: "14:30"
      required: true
      selector:
        time: {}
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_charge_end_time:
  name: Set Charge End Time
  description: Set the end time for battery charging.
  fields:
    end_charge:
      name: End Charge Time
      description: HH:MM
      example: "16:00"
      required: true
      selector:
        time: {}
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_minimum_soc:
  name: Set Minimum SOC
  description: Set the minimum battery state of charge percentage.
  fields:
    minimum_soc:
      name: Minimum SOC
      description: 1–100 %
      example: 10
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_charge_cap:
  name: Set Charge Cap
  description: Set the maximum battery charge cap percentage.
  fields:
    charge_cap:
      name: Charge Cap
      description: 1–100 %
      example: 90
      required: true
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

update_battery_settings:
  name: Update Battery Settings
  description: Update multiple battery settings in one call.
  fields:
    start_discharge:
      name: Start Discharge Time
      description: HH:MM
      example: "16:00"
      required: false
      selector:
        time: {}
    end_discharge:
      name: End Discharge Time
      description: HH:MM
      example: "23:00"
      required: false
      selector:
        time: {}
    start_charge:
      name: Start Charge Time
      description: HH:MM
      example: "14:30"
      required: false
      selector:
        time: {}
    end_charge:
      name: End Charge Time
      description: HH:MM
      example: "16:00"
      required: false
      selector:
        time: {}
    minimum_soc:
      name: Minimum SOC
      description: 1–100 %
      example: 10
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    charge_cap:
      name: Charge Cap
      description: 1–100 %
      example: 90
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

start_force_charge:
  name: Start Force Charge
  description: Start immediate battery charging using the portal's force-charge endpoint.
  fields:
    charge_cap:
      name: Charge Cap
      description: Optional battery cap used by the portal when starting force charge.
      required: false
      example: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

stop_force_charge:
  name: Stop Force Charge
  description: Stop the immediate force-charge action.
  fields:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_grid_feedin_enabled:
  name: Set Grid Feed-in Enabled
  description: Enable or disable the Grid Feed-in Function.
  fields:
    feedin_enabled:
      name: Enabled
      description: True to enable, false to disable.
      required: true
      example: true
      selector:
        boolean:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

set_grid_feedin_cutoff_soc:
  name: Set Grid Feed-in Cutoff SOC
  description: Battery % at which grid feed-in stops discharging.
  fields:
    feedin_cutoff_soc:
      name: Cutoff SOC
      description: 0–100 %
      required: true
      example: 20
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

update_grid_feedin_slot:
  name: Update Grid Feed-in Slot
  description: >-
    Update one of the grid feed-in time periods (start time, end time,
    and/or power). The inverter supports up to 6 slots.
  fields:
    slot:
      name: Slot Number
      description: Time slot number (1–6).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 6
          step: 1
    start_time:
      name: Start Time
      description: HH:MM
      required: false
      example: "17:00"
      selector:
        time: {}
    end_time:
      name: End Time
      description: HH:MM
      required: false
      example: "21:00"
      selector:
        time: {}
    power_watts:
      name: Grid Feed-in Power (W)
      description: 0–20 000 W
      required: false
      example: 4000
      selector:
        number:
          min: 0
          max: 20000
          step: 100
          unit_of_measurement: "W"
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_upsert_rule:
  name: Upsert Pricing Rule
  description: Save or update one date-based pricing rule.
  fields:
    rule_id:
      name: Rule ID
      description: Optional existing rule id for updates. Leave blank for a new rule.
      required: false
      selector:
        text:
    effective_date:
      name: Effective Date
      description: Date the rule starts applying.
      required: true
      selector:
        date:
    effective_time:
      name: Effective Time
      description: Start time for the rule.
      required: false
      selector:
        time: {}
    effective_end_date:
      name: Effective End Date
      description: Optional end date for the rule.
      required: false
      selector:
        date:
    effective_end_time:
      name: Effective End Time
      description: Optional end time for the rule.
      required: false
      selector:
        time: {}
    pricing_type:
      name: Pricing Type
      description: Fixed or dynamic pricing.
      required: false
      default: fixed
      selector:
        select:
          options:
            - fixed
            - dynamic
    provider:
      name: Provider
      description: Tariff or retailer name.
      required: false
      selector:
        text:
    label:
      name: Label
      description: Human-friendly rule label.
      required: false
      selector:
        text:
    import_rate:
      name: Import Rate
      description: Price for imported energy.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: c/kWh
    export_rate:
      name: Export Rate
      description: Price for exported energy.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: c/kWh
    supply_charge:
      name: Supply Charge
      description: Daily supply charge.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/day
    controlled_load_1:
      name: Controlled Load 1
      description: Controlled load 1 rate.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: c/kWh
    controlled_load_2:
      name: Controlled Load 2
      description: Controlled load 2 rate.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: c/kWh
    additional_charge:
      name: Additional Charge
      description: Extra fee or adjustment.
      required: false
      selector:
        number:
          min: -100
          max: 100
          step: 0.001
          unit_of_measurement: $
    holiday_only:
      name: Holiday Only
      description: Apply only on public holidays.
      required: false
      selector:
        boolean:
    days_of_week:
      name: Days of Week
      description: Optional list of weekdays, e.g. mon,tue,wed.
      required: false
      selector:
        text:
    notes:
      name: Notes
      description: Optional notes for the rule.
      required: false
      selector:
        text:
    region:
      name: Region
      description: Optional region for future holiday imports.
      required: false
      selector:
        text:
    holiday_source:
      name: Holiday Source
      description: Source label such as manual or Workday.
      required: false
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_remove_rule:
  name: Remove Pricing Rule
  description: Delete one stored pricing rule by id.
  fields:
    rule_id:
      name: Rule ID
      description: Stored rule id to remove.
      required: true
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_upsert_group:
  name: Upsert Pricing Group
  description: Save or update one date-effective pricing rate group.
  fields:
    group_id:
      name: Group ID
      description: Optional existing group id for updates. Leave blank for a new group.
      required: false
      selector:
        text:
    label:
      name: Label
      description: Human-friendly group label.
      required: false
      selector:
        text:
    provider:
      name: Provider
      description: Tariff or retailer name.
      required: false
      selector:
        text:
    plan_name:
      name: Plan Name
      description: Optional plan name.
      required: false
      selector:
        text:
    effective_start_date:
      name: Effective Start Date
      description: Date the group starts applying. The next group supersedes this one.
      required: true
      selector:
        date:
    pricing_type:
      name: Pricing Type
      description: Fixed or dynamic pricing. Both use day/time/public-holiday records.
      required: false
      default: dynamic
      selector:
        select:
          options:
            - fixed
            - dynamic
    daily_connection_charge:
      name: Daily Connection Charge
      description: Daily fixed charge in dollars/day.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/day
    other_charges:
      name: Other Charges
      description: Other named charges to record for the group.
      required: false
      selector:
        text:
    notes:
      name: Notes
      description: Optional notes for the group.
      required: false
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_remove_group:
  name: Remove Pricing Group
  description: Delete one pricing rate group and all of its records.
  fields:
    group_id:
      name: Group ID
      description: Stored group id to remove.
      required: true
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_upsert_record:
  name: Upsert Pricing Record
  description: Save or update one day/time pricing record inside a group.
  fields:
    group_id:
      name: Group ID
      description: Parent pricing group id.
      required: true
      selector:
        text:
    record_id:
      name: Record ID
      description: Optional existing record id for updates. Leave blank for a new record.
      required: false
      selector:
        text:
    record_type:
      name: Record Type
      description: Whether this record is a buy/import price or sell/feed-in price.
      required: false
      default: buy
      selector:
        select:
          options:
            - buy
            - sell
    label:
      name: Label
      description: Human-friendly record label.
      required: false
      selector:
        text:
    day_types:
      name: Day Types
      description: Comma/list of day types such as mon,tue,wed or public_holiday.
      required: true
      selector:
        text:
    effective_time:
      name: Start Time
      description: Start time for the record.
      required: true
      selector:
        time: {}
    effective_end_time:
      name: End Time
      description: End time for the record.
      required: true
      selector:
        time: {}
    import_rate:
      name: Import Rate
      description: Import rate in dollars/kWh, e.g. 0.42.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/kWh
    export_rate:
      name: Export Rate
      description: Flat export/feed-in rate in dollars/kWh when the plan does not use tiers.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/kWh
    export_tier_1_limit:
      name: Export Tier 1 Limit
      description: First sell/feed-in block size in kWh, e.g. 1000.
      required: false
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: kWh
    export_tier_1_rate:
      name: Export Tier 1 Rate
      description: Sell/feed-in rate for the first block in dollars/kWh, e.g. 0.08.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/kWh
    export_tier_2_rate:
      name: Export Tier 2 Rate
      description: Sell/feed-in rate after the first block in dollars/kWh, e.g. 0.02.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/kWh
    controlled_load_rate:
      name: Controlled Load Rate
      description: Controlled load rate in dollars/kWh.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.001
          unit_of_measurement: $/kWh
    other_charges:
      name: Other Charges
      description: Other named charges to record.
      required: false
      selector:
        text:
    notes:
      name: Notes
      description: Optional notes for the record.
      required: false
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_remove_record:
  name: Remove Pricing Record
  description: Delete one pricing record from a group.
  fields:
    group_id:
      name: Group ID
      description: Parent pricing group id.
      required: true
      selector:
        text:
    record_id:
      name: Record ID
      description: Stored record id to remove.
      required: true
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:

pricing_set_holidays:
  name: Set Holiday Dates
  description: Replace the stored holiday calendar.
  fields:
    holiday_dates:
      name: Holiday Dates
      description: Comma-separated list or list selector of public holiday dates.
      required: true
      selector:
        text:
    holiday_source:
      name: Holiday Source
      description: Source label such as manual or Workday.
      required: false
      selector:
        text:
    region:
      name: Region
      description: Optional region for the holiday set.
      required: false
      selector:
        text:
    entry_id:
      name: Integration ID
      description: Required only if multiple accounts are configured.
      example: "abcdef1234"
      required: false
      selector:
        text:
